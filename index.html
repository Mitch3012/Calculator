<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">

        <title>Calculator</title>
    </head>
    <body>

        
        <div class="calculator">
            <input type="text" id="display" value="" readonly>
            <div class='keys'>
                <button onclick="appendValue('7')" value='7'>7</button>
                <button onclick="appendValue('8')" value='8'>8</button>   
                <button onclick="appendValue('9')" value='9'>9</button>
                <button class= "operator" onclick ="appendValue('/')" value='/'>/</button>
                <button onclick="appendValue('4')" value='4'>4</button> 
                <button onclick="appendValue('5')" value='5'>5</button>
                <button onclick="appendValue('6')" value='6'>6</button>  
                <button class= "operator"onclick="appendValue('*')" value='*'>*</button>
                <button onclick="appendValue('1')" value='1'>1</button>
                <button onclick="appendValue('2')" value='2'>2</button>
                <button onclick="appendValue('3')" value='3'>3</button>
                <button class= "operator" onclick="appendValue('-')" value='-'>-</button>    
                <button onclick="appendValue('0')" value='0'>0</button>
                <button onclick="appendValue('.')" value='.'>.</button>
                <button id="equals" class="operator" onclick="calculate()" value='='>=</button>
                <button class="operator" onclick="appendValue('+')" value='+'>+</button> 
                <button id="clear" onclick="clearDisplay()" value='C'>C</button>
            </div>
        </div>
         <script src="script.js"></script>        
    </body>
</html>
